# .goreleaser.yaml
version: 2

project_name: minisky

before:
  hooks:
    - go mod tidy

builds:
  - id: linux
    main: ./cmd/minisky
    binary: minisky
    env: [CGO_ENABLED=1]
    goos: [linux]
    goarch: [amd64]

  - id: windows
    main: ./cmd/minisky
    binary: minisky
    env: [CGO_ENABLED=0]
    goos: [windows]
    goarch: [amd64]

archives:
  - name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
      - CONTRIBUTING.md
      - docs/*
      - LICENSE*

scoops:
  - name: minisky
    repository:
      owner: qamarudeenm
      name: scoop-bucket
    homepage: https://github.com/qamarudeenm/minisky
    description: High-fidelity local GCP emulator.
    license: MIT

nfpms:
  - id: minisky-pkg
    package_name: minisky
    vendor: MiniSky Open Source
    homepage: https://github.com/qamarudeenm/minisky
    maintainer: MiniSky Team <maintainers@minisky.dev>
    description: High-fidelity local GCP emulator.
    license: MIT
    formats:
      - deb
      - rpm

homebrews:
  - name: minisky
    repository:
      owner: qamarudeenm
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/qamarudeenm/minisky
    description: High-fidelity local GCP emulator.
    install: |
      bin.install "minisky"
    test: |
      system "#{bin}/minisky version"

checksum:
  name_template: 'checksums.txt'

release:
  github:
    owner: qamarudeenm
    name: minisky
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## MiniSky v1.0.0 - Analytical Engine & BigQuery Support
    This release brings high-fidelity BigQuery emulation powered by DuckDB.
  footer: |
    **Full Changelog**: https://github.com/qamarudeenm/minisky/compare/{{ .PreviousTag }}...{{ .Tag }}

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
